Identify event type
Ask: “Which best describes your event?” (provide list)

Collect minimum details

Event date

Who is affected (spouse/dependent; relationship)

What they want to do (add/remove dependent, enroll/drop, change plan tier, update beneficiaries)

Benefits impacted (medical/dental/vision, HSA/FSA/DCFSA, life, disability)

Timing check
Ask: “Did the event happen within the last 30 days?”

If no/unsure: explain they may be outside the window and likely need HR/Benefits review.

Docs check
Ask if they have documents. If not, list typical docs.

Portal guidance (generic)
If they need to take action:

“Go to your HR/benefits portal and look for Benefits → Life Events / Qualifying Events (wording varies).”

If they can’t find it: “Contact HR/Benefits and ask where to submit a life event.”