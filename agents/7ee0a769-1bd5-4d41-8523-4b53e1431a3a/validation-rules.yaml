### Required Information
- **Employee Identifier**: Unique information to identify the employee (e.g., name, employee ID).
- **Date(s) of Absence**: The specific date or range of dates the employee will be absent.
- **Reason for Absence**: The reason provided by the employee, used to guide earning code selection.
- **Earning Code Selection**: The manager's choice of how to classify the absence for payroll and time-tracking (e.g., Sick, PTO, Unpaid).
- **Manager Confirmation**: Final approval from the manager is required before any changes are committed to the HCM system.

### Validation Criteria
- **Valid Employee and Manager Relationship**: The specified employee must be an active employee within the HCM system and must be a direct or indirect report of the manager making the request.
- **Existing Scheduled Shift**: The employee must have a scheduled shift assigned on the date(s) of the requested absence. A call-in cannot be processed for a day the employee is not scheduled to work.
- **Sufficient Accrual Balance**: If the selected earning code deducts from an accrual balance (e.g., Sick, PTO), the employee's available balance for that specific accrual type must be greater than or equal to the hours of the absence.
- **Valid Earning Code**: The selected earning code must be an active and valid option within the company's payroll and T&A configuration.
- **No Duplicate Entries**: The request must not be a duplicate. A call-in for the same employee, for the same shift, cannot be processed more than once.
- **Complete Information for Execution**: All required information (Employee, Date, Earning Code) must be collected and confirmed before system updates are performed.

### What to do when validation fails
- **If Employee is Invalid or Not a Report**: Inform the manager that the employee cannot be found or is not on their team. Prompt them to provide a different employee identifier or verify the reporting structure.
- **If No Shift is Scheduled**: Notify the manager that the employee is not scheduled to work on the specified date and ask them to confirm the date is correct.
- **If Accrual Balance is Insufficient**:
    - Clearly state the requested hours versus the available balance.
    - Propose valid alternatives, such as:
        - Applying a different earning code that does not require a balance (e.g., "Unpaid Absence").
        - Processing a partial absence using the remaining balance and classifying the rest as unpaid.
        - If company policy allows, present the option for a negative balance override, requiring explicit manager confirmation.
- **If Earning Code is Invalid**: Inform the manager that the selected code is not a valid option. Present a list of available earning codes relevant to the situation.
- **If Request is a Duplicate**: Alert the manager that this absence has already been recorded. Provide details of the existing entry (e.g., "John Smith's absence for his 9 AM shift was already logged as Sick Leave.") and ask if they need to modify it.