# Validation Rules for QLE & Benefits Support Agent

## 1. Required Context Information
To validate a request, the agent must dynamically gather the following context. The order is flexible, but all points must be established before confirming a path forward.

*   **Event Classification:** The user's situation must map to a recognized Qualified Life Event (e.g., Marriage, Birth, Loss of Coverage) defined in the `life_events_qle` table.
*   **Event Date:** The specific date the life event occurred (or will occur) to calculate submission windows.
*   **Desired Action:** What the user wants to do (e.g., "Add a child," "Drop coverage") to cross-reference with allowed changes.
*   **Current Residency (For Moves):** If the event is a move, confirmation of whether the move affects plan availability (e.g., moving out of a coverage area or state).

## 2. Eligibility & Timing Validation Principles
*   **Submission Window Adherence:**
    *   The request is **Valid** if the `Current Date` is within the `window_days` from the `Event Date`.
    *   **Standard Rule:** 30 days for most events (Marriage, Birth, Divorce, Move, etc.).
    *   **Exception Rule:** 60 days for Medicaid/CHIP changes.
*   **Event-Action Consistency:**
    *   The desired benefit change must align with the specific `allowed_changes` for that event type.
    *   *Example:* Requesting to "Drop Coverage" is **Invalid** for a "Birth" event (unless specific exceptions apply), but **Valid** for "Gain of Other Coverage."
    *   *Example:* Requesting to "Add Spouse" is **Invalid** for "Divorce."
*   **Domestic Partner Check:**
    *   If the user specifically mentions "Domestic Partner" (rather than Spouse), the request is flagged as **Complex/Review Required** immediately, as eligibility varies by specific plan documents not present in the general table.

## 3. Documentation & Evidence Validation
*   **Document Readiness:** The user must acknowledge possession of, or ability to obtain, the `required_documents` mapped to their event type.
    *   *Marriage:* Marriage Certificate.
    *   *Divorce:* Decree/Court Order.
    *   *Birth:* Hospital Record or Birth Certificate.
    *   *Loss of Coverage:* Termination Letter/COBRA notice.
*   **Attestation vs. Proof:**
    *   If the policy lists `docs_required_default: false`, simple user attestation is **Valid**.
    *   If specific events list documents (e.g., Marriage), the request is only **Valid** if the user is informed that proof is mandatory.

## 4. Address Change Specific Validation
If the intent is solely an address update (not a QLE move affecting benefits availability):
*   **State Format:** Must be a valid 2-letter abbreviation.
*   **Zip Code:** Must be exactly 5 or 9 digits.
*   **P.O. Box Logic:**
    *   **Valid** for Mailing Address.
    *   **Valid** for Residential Address (per `allow_po_box_as_residential: true`).
*   **Cross-State Triggers:** If `move_to_new_state` is detected, the validation passes but triggers a specific notification regarding Payroll/Tax withholding.

## 5. Handling Validation Failures & Escalations
When a request fails the criteria above or hits a guardrail, the agent must transition from "Guidance" mode to "Handoff/Escalation" mode.

*   **Late Submissions (Time-Barred):**
    *   *Condition:* Current Date > Event Date + Window Days.
    *   *Action:* Do not proceed with standard workflow. Inform the user they are outside the standard window and must submit a manual exception request to HR.
*   **Policy Mismatches:**
    *   *Condition:* User wants to perform an action not listed in `allowed_changes` (e.g., Changing Medical Plan just because they got married, without adding the spouse).
    *   *Action:* Explain the `consistency_rule` ("Changes must be consistent with the life event") and offer to connect them with HR for clarification.
*   **Complex Dependents:**
    *   *Condition:* Questions regarding Domestic Partners, legal guardianships (other than standard Adoption/Foster), or over-age dependents.
    *   *Action:* Escalate to HR/Benefits team.
*   **Ambiguity:**
    *   *Condition:* User cannot determine if their move affects plan availability.
    *   *Action:* Direct user to HR/Benefits to verify service area maps.