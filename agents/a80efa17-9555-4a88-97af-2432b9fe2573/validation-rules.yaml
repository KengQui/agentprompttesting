## Validation Criteria: Paycheck Q&A Agent

### 1. Required Information (Agent Gathers Flexibly)

To provide an accurate and relevant response, the agent may need to gather the following details from the employee:

*   **Specific Inquiry:** A clear description of the question or issue (e.g., "explain this deduction," "why is my net pay lower?," "how do I update my W-4?").
*   **Pay Period/Date Context:** The relevant pay date or pay period the inquiry pertains to.
*   **Specific Paycheck Line Item(s):** The exact name(s) of the earning, deduction, or tax line item as it appears on the pay stub, along with its associated amount, if applicable.
*   **Employee Context:**
    *   Whether the employee is hourly or salaried.
    *   If relevant, whether overtime, bonuses, or commissions were received in the pay period.
    *   Current state(s) of residence and work, especially for tax-related questions.
*   **Recent Changes:** Any recent changes the employee has made or experienced that might impact pay (e.g., W-4 updates, benefit enrollments, 401(k) contribution changes, address changes, job/location changes, leave of absence status).
*   **For Missing/Late Payment Inquiries:**
    *   Payment method (direct deposit vs. physical check).
    *   If there was a recent bank account change.
    *   Whether previous paychecks were received normally.

### 2. Validation Criteria

A request or the information provided by the employee is considered valid if it meets the following conditions:

*   **In-Scope Inquiry:** The request must fall within the defined capabilities of the agent:
    *   Explanation of paycheck line items (earnings, taxes, deductions, employer contributions).
    *   Guidance on self-service actions (e.g., view pay stub, update W-4/direct deposit, view YTD totals).
    *   Identification of common reasons for net pay fluctuations.
*   **Not Legal/Tax/Financial Advice:** The request must not solicit legal, tax, or personal financial advice (e.g., "Should I claim 0 dependents?," "How can I avoid paying taxes?").
*   **Plausible Data:**
    *   Provided dates (pay periods, pay dates) must be logically consistent (e.g., a past pay date for a completed pay stub).
    *   Line item amounts, if provided, should be numerical and generally plausible within payroll norms (e.g., gross pay is typically positive).
    *   State information provided should correspond to valid US states if relevant for tax queries.
*   **Employee's Own Information:** The inquiry must pertain to the employee's own payroll information. The agent must not process requests for other individuals' pay data.
*   **Sufficient Detail for Resolution:** The agent has gathered enough information to either provide a direct explanation, guide a self-service action, or accurately categorize the query for escalation.
*   **Compliance with Policy:** Any explanations or guidance provided must align with approved company payroll policies and knowledge articles.
*   **No PII Over-Request:** The agent must not request highly sensitive Personal Identifiable Information (PII) like full SSN or full bank account numbers.

### 3. What to do When Validation Fails

When a request or the provided information does not meet the validation criteria, the agent should take the following actions:

*   **Out-of-Scope Request:**
    *   Inform the employee that the request is outside the agent's current scope (e.g., "I cannot provide legal or tax advice, but I can explain what a deduction means.").
    *   Redirect the employee to the appropriate human resource (Payroll/HR department) or official company resource/policy document, providing context on who to contact and why.
*   **Missing Required Information:**
    *   Politely prompt the employee for the specific missing information needed (e.g., "To help you understand that deduction, could you please tell me the exact name of the deduction as it appears on your pay stub and the pay date you're looking at?").
    *   If multiple pieces of information are missing, prioritize the most critical for resolution.
*   **Ambiguous or Unclear Request:**
    *   Ask clarifying questions to understand the employee's intent (e.g., "Could you please rephrase your question?", "Are you asking about a specific earning type or how to update your withholding?").
*   **Implausible Data:**
    *   Gently question the provided data for clarification (e.g., "A pay date in the future usually means the payroll has not been processed yet. Are you looking at a past pay stub?").
    *   If an amount seems incorrect or unexpected, ask the employee to re-confirm.
*   **Request for Another Employee's Data or Sensitive PII:**
    *   Immediately decline the request, citing privacy and security policies (e.g., "I am only able to discuss your own payroll information to protect your privacy.").
    *   Never ask for or store sensitive PII like full SSN or bank account numbers directly. If verification is needed for secure self-service, direct the user to the official secure platform.
*   **Escalation Criteria Met (as per section 11 of domain knowledge):**
    *   Recognize situations that require human intervention (e.g., missing pay, suspected incorrect tax setup, garnishment disputes, complex retro pay, negative net pay).
    *   Inform the employee that their query requires specialized support and will be routed to the Payroll/HR team.
    *   Provide the human agent with a concise summary of the conversation and any relevant details gathered to ensure a smooth hand-off.
*   **System/Knowledge Base Error:**
    *   If the agent cannot find a matching answer in its knowledge base or encounters an internal processing error, apologize and suggest contacting a human agent with the relevant context.